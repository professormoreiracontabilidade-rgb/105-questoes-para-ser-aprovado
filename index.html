<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">

<title>Quiz Mobile - Lista 3 Professor Moreira</title>
<style>
:root{--azul:#082b4a;--azul2:#0f4778;--verde:#128043;--vermelho:#b42318;--fundo:#eef4fb;--card:#ffffff;--texto:#111827;--muted:#6b7280;--amarelo:#fff3bf;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#e8f1fb,#f8fbff);color:var(--texto);}
.app{max-width:720px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:14px 12px 32px;}
.header{background:var(--azul);color:white;border-radius:18px;padding:14px 14px;box-shadow:0 8px 20px rgba(8,43,74,.18);position:sticky;top:0;z-index:5;}
.brand{font-weight:900;font-size:17px;line-height:1.15} .sub{font-size:12px;opacity:.9;margin-top:3px}
.progress{height:10px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden;margin-top:11px} .bar{height:100%;width:0;background:#facc15;transition:.25s}
.meta{display:flex;justify-content:space-between;font-size:12px;margin-top:8px;opacity:.96}
.card{background:var(--card);border:1px solid #dbe7f3;border-radius:20px;padding:18px;margin-top:14px;box-shadow:0 10px 24px rgba(15,71,120,.10);}
.study-card{min-height:58vh;}
.wacom-space{min-height:170px;margin-top:16px;border-radius:16px;background:linear-gradient(180deg,#ffffff,#fbfdff);border:2px dashed #dbe7f3;touch-action:none;}
.wacom-note{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;}
.controls-card{padding:12px;position:sticky;top:98px;z-index:4;}
.nav.four{grid-template-columns:1fr 1fr 1fr 1fr;}
.restart{background:#fff7ed;color:#9a3412;border:2px solid #fed7aa;}
@media(max-width:430px){.nav.four{grid-template-columns:1fr 1fr;}button{font-size:14px;padding:12px 10px}.study-card{min-height:54vh}.wacom-space{min-height:150px}}
.lock{margin-top:20px;text-align:center} .lock h1{font-size:26px;margin:8px 0 8px;color:var(--azul)} .lock p{color:#374151;line-height:1.45}
input[type=text]{width:100%;font-size:18px;padding:15px;border-radius:14px;border:2px solid #c7d7e8;margin:12px 0;background:white}
button{border:0;border-radius:16px;padding:14px 16px;font-weight:900;font-size:16px;cursor:pointer}
.primary{background:var(--azul);color:white;width:100%;box-shadow:0 8px 18px rgba(8,43,74,.22)} .secondary{background:#e6eef7;color:var(--azul)} .ok{background:var(--verde);color:white} .danger{background:var(--vermelho);color:white}
.qnum{display:inline-block;background:#dbeafe;color:var(--azul);padding:7px 11px;border-radius:999px;font-weight:900;font-size:13px;margin-bottom:10px}
.statement{font-size:18px;line-height:1.45;margin:4px 0 14px} .statement p{margin:0 0 10px}
.alt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:#f8fafc;border:2px solid #dbe7f3;margin:10px 0;border-radius:15px;padding:13px;color:#111827}
.alt .letter{min-width:34px;height:34px;border-radius:10px;background:#e5eef8;color:var(--azul);display:flex;align-items:center;justify-content:center;font-weight:900}
.alt.selected{border-color:var(--azul2);background:#eaf4ff} .alt.correct{border-color:var(--verde);background:#ecfdf3} .alt.wrong{border-color:var(--vermelho);background:#fff1f2}
.answerBox{background:#f8fafc;border-left:6px solid var(--azul);padding:12px;border-radius:12px;margin:12px 0;font-size:16px;line-height:1.45}
.gabarito{font-size:22px;font-weight:900;color:var(--verde)} .comment{font-size:17px;line-height:1.48} .comment b{color:var(--azul)}
.bottom{display:none}
.nav{max-width:100%;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:9px} .nav.three{grid-template-columns:1fr 1fr 1fr}
.hidden{display:none!important} .small{font-size:13px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:12px} .dot{padding:8px 0;border-radius:10px;background:#e5e7eb;color:#111;font-size:12px;font-weight:bold} .dot.answered{background:#bbf7d0} .dot.current{outline:3px solid var(--azul)}
.final h2{color:var(--azul)} textarea{width:100%;height:160px;border:2px solid #dbe7f3;border-radius:14px;padding:12px;font-size:14px}
@media print{.bottom,.header .progress,.lock{display:none} body{background:white} .app{max-width:none;padding:0} .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}}
</style>
</head>
<body>
<div id="app" class="app">
  <div class="header">
    <div class="brand">Curso de Contabilidade Professor Moreira</div>
    <div class="sub">Lista 3 • Quiz Mobile • 105 questões comentadas</div>
    <div class="progress"><div id="bar" class="bar"></div></div>
    <div class="meta"><span id="metaQ">Questão 1/105</span><span id="timer">00:00:00</span></div>
  </div>

  <section id="lock" class="card lock">
    <div style="font-size:44px">🔒</div>

  </section>

  <section id="bottomNav" class="hidden card controls-card">

      <button class="secondary" onclick="prev()">◀ Voltar</button>

      <button class="secondary" onclick="next()">Avançar ▶</button>
      <button class="restart" onclick="restart()">↻ Reiniciar</button>
    </div>

  <section id="gridCard" class="hidden card">
    <b>Grade de questões</b>
    <div id="grid" class="grid"></div>
  </section>

  <section id="final" class="hidden card final"></section>
</div>

<script>
const QUESTIONS = [{"n": 1, "text": "Segundo a NBC TG Estrutura Conceitual, para que a representacao das informacoes financeiras seja fidedigna, ela deve ser:", "alts": [{"letter": "A", "text": "completa, neutra e isenta de erros."}, {"letter": "B", "text": "relevante, tempestiva e comparavel."}, {"letter": "C", "text": "prudente, verificavel e material."}, {"letter": "D", "text": "uniforme, compreensivel e conservadora."}], "answer": "A", "comment": "<b>Comentário:</b> Representacao fidedigna exige tres atributos: completude, neutralidade e ausencia de erro. Tempestividade, comparabilidade, verificabilidade e compreensibilidade sao caracteristicas de melhoria."}, {"n": 2, "text": "De acordo com a NBC TG Estrutura Conceitual, a informacao contábil representa fidedignamente o fenomeno econômico quando e:", "alts": [{"letter": "A", "text": "completa, neutra e livre de erro material."}, {"letter": "B", "text": "comparavel, verificavel e tempestiva."}, {"letter": "C", "text": "material, prudente e conservadora."}, {"letter": "D", "text": "tempestiva, util e uniforme."}], "answer": "A", "comment": "<b>Comentário:</b> A banca costuma trocar caracteristicas fundamentais por caracteristicas de melhoria. A representacao fidedigna esta ligada a completar a descricao, manter neutralidade e evitar erros."}, {"n": 3, "text": "Segundo a NBC TG 26, ao elaborar as demonstracoes contabeis, a administracao deve avaliar se a entidade continuara em operacao no futuro previsivel. Esse pressuposto e denominado:", "alts": [{"letter": "A", "text": "continuidade."}, {"letter": "B", "text": "competencia."}, {"letter": "C", "text": "materialidade."}, {"letter": "D", "text": "compensacao."}], "answer": "A", "comment": "<b>Comentário:</b> As demonstracoes sao elaboradas sob o pressuposto da continuidade, salvo intencao de liquidar, encerrar atividades ou inexistencia de alternativa realista."}, {"n": 4, "text": "A Cia Horizonte nao pretende encerrar suas atividades e nao ha indicios de liquidacao. Assim, suas demonstracoes contabeis devem ser elaboradas com base no pressuposto da:", "alts": [{"letter": "A", "text": "continuidade."}, {"letter": "B", "text": "caixa."}, {"letter": "C", "text": "prudencia absoluta."}, {"letter": "D", "text": "compensacao obrigatoria."}], "answer": "A", "comment": "<b>Comentário:</b> O pressuposto adequado e continuidade. Regime de caixa nao e base geral para elaboracao das demonstracoes, e compensacao nao e pressuposto."}, {"n": 5, "text": "Sobre ativo nao circulante mantido para venda, analise: I. Quando atendidos os criterios, deve ser apresentado no ativo circulante. II. As regras tambem se aplicam a ativo destinado a distribuicao aos socios. III. Deve ser mensurado pelo maior entre valor contabil e valor justo liquido de despesas de venda. Esta correto:", "alts": [{"letter": "A", "text": "I, somente."}, {"letter": "B", "text": "I e II, somente."}, {"letter": "C", "text": "I, II e III."}, {"letter": "D", "text": "II, somente."}], "answer": "B", "comment": "<b>Comentário:</b> I e II estao corretas. O erro esta na III: a mensuracao e pelo menor entre o valor contabil e o valor justo menos despesas de venda."}, {"n": 6, "text": "Uma entidade classificou um equipamento como mantido para venda. Julgue: I. Ele passa a ser apresentado separadamente no circulante. II. A depreciacao deve ser interrompida. III. A mensuracao inicial da classificacao e pelo maior valor entre custo historico e valor justo. Esta correto:", "alts": [{"letter": "A", "text": "I e II, somente."}, {"letter": "B", "text": "I, somente."}, {"letter": "C", "text": "II e III, somente."}, {"letter": "D", "text": "I, II e III."}], "answer": "A", "comment": "<b>Comentário:</b> Mantido para venda fica no circulante e deixa de ser depreciado. A mensuracao e pelo menor entre valor contabil e valor justo liquido de despesas de venda, nao pelo maior."}, {"n": 7, "text": "Relacione: a. Despesa; b. Patrimonio Liquido; c. Receita. I. Aumentos nos ativos ou reducoes nos passivos que aumentam o PL. II. Reducoes nos ativos ou aumentos nos passivos que reduzem o PL. III. Participacao residual nos ativos apos deduzir passivos. A sequencia a, b e c e:", "alts": [{"letter": "A", "text": "II - III - I."}, {"letter": "B", "text": "I - III - II."}, {"letter": "C", "text": "II - I - III."}, {"letter": "D", "text": "I - II - III."}], "answer": "A", "comment": "<b>Comentário:</b> Despesa reduz o PL; patrimonio liquido e a participacao residual; receita aumenta o PL."}, {"n": 8, "text": "Conforme a Estrutura Conceitual, associe: a. Receita; b. Despesa; c. Patrimonio Liquido. I. Participacao residual nos ativos depois de deduzidos os passivos. II. Aumentos nos ativos ou reducoes nos passivos que elevam o PL. III. Reducoes nos ativos ou aumentos nos passivos que diminuem o PL. A ordem a, b e c e:", "alts": [{"letter": "A", "text": "II - III - I."}, {"letter": "B", "text": "III - II - I."}, {"letter": "C", "text": "I - II - III."}, {"letter": "D", "text": "II - I - III."}], "answer": "A", "comment": "<b>Comentário:</b> Receita aumenta o PL; despesa diminui o PL; PL e o residuo dos ativos menos passivos."}, {"n": 9, "text": "A sociedade Alfa recebeu laudo indicando perda provavel em acao civel, mas o valor nao pode ser mensurado com confiabilidade. O tratamento adequado e:", "alts": [{"letter": "A", "text": "reconhecer provisao pelo maior valor estimado."}, {"letter": "B", "text": "reconhecer provisao pelo menor valor possivel."}, {"letter": "C", "text": "nao reconhecer provisao e divulgar como passivo contingente."}, {"letter": "D", "text": "nao reconhecer nem divulgar."}], "answer": "C", "comment": "<b>Comentário:</b> Para reconhecer provisao, e necessario obrigacao presente, saida provavel de recursos e estimativa confiavel. Sem mensuracao confiavel, nao se reconhece provisao; divulga-se passivo contingente."}, {"n": 10, "text": "A Cia Beta tem processo trabalhista com perda provavel, mas os advogados afirmam que nao ha estimativa confiavel do valor. Nas demonstracoes, a companhia deve:", "alts": [{"letter": "A", "text": "registrar despesa e provisao."}, {"letter": "B", "text": "registrar ativo contingente."}, {"letter": "C", "text": "nao reconhecer provisao e divulgar em nota explicativa."}, {"letter": "D", "text": "ignorar o fato por ser apenas provavel."}], "answer": "C", "comment": "<b>Comentário:</b> A falta de estimativa confiavel impede o reconhecimento. Como ha probabilidade de saida de recursos, a informacao deve ser divulgada em nota como passivo contingente."}, {"n": 11, "text": "Na DVA, a reversao de perdas estimadas com creditos de liquidacao duvidosa deve ser apresentada:", "alts": [{"letter": "A", "text": "em remuneracao de capitais proprios."}, {"letter": "B", "text": "em remuneracao de capitais de terceiros."}, {"letter": "C", "text": "em valor adicionado recebido em transferencia."}, {"letter": "D", "text": "em riqueza criada pela propria entidade."}], "answer": "D", "comment": "<b>Comentário:</b> PECLD e sua reversao integram a primeira parte da DVA, dentro da riqueza criada pela propria entidade, como item ligado a receitas e insumos/retencoes."}, {"n": 12, "text": "Uma empresa reconheceu reversao de perda estimada com clientes no periodo. Na DVA, esse valor deve compor:", "alts": [{"letter": "A", "text": "a primeira parte, como riqueza criada pela propria entidade."}, {"letter": "B", "text": "a segunda parte, como distribuicao a empregados."}, {"letter": "C", "text": "a segunda parte, como remuneracao de capital de terceiros."}, {"letter": "D", "text": "valor adicionado recebido em transferencia."}], "answer": "A", "comment": "<b>Comentário:</b> A reversao de PECLD entra na apuracao do valor adicionado gerado pela entidade, nao na distribuicao do valor adicionado."}, {"n": 13, "text": "Na DVA, o total de remuneracao de capitais proprios corresponde, em regra, a:", "alts": [{"letter": "A", "text": "lucros retidos/prejuizo do exercicio e dividendos/juros sobre capital proprio."}, {"letter": "B", "text": "apenas reservas de capital."}, {"letter": "C", "text": "apenas pagamento de emprestimos."}, {"letter": "D", "text": "salarios, encargos e beneficios."}], "answer": "A", "comment": "<b>Comentário:</b> Remuneracao de capitais proprios engloba dividendos, juros sobre capital proprio e lucros retidos ou prejuizo do exercicio."}, {"n": 14, "text": "Ao distribuir o valor adicionado, a entidade classificou dividendos e lucros retidos. Esses itens pertencem ao grupo:", "alts": [{"letter": "A", "text": "remuneracao de capitais proprios."}, {"letter": "B", "text": "remuneracao de capitais de terceiros."}, {"letter": "C", "text": "pessoal."}, {"letter": "D", "text": "governo."}], "answer": "A", "comment": "<b>Comentário:</b> Dividendos, JCP e lucros retidos representam remuneracao dos proprietarios ou manutencao do resultado no patrimonio liquido."}, {"n": 15, "text": "Uma loja apresentou: receita de clientes R$ 300.000; CMV, incluindo impostos recuperaveis, R$ 120.000; PECLD R$ 9.000; perda por impairment do imobilizado R$ 15.000; depreciacao R$ 20.000. O valor adicionado liquido produzido e:", "alts": [{"letter": "A", "text": "R$ 136.000."}, {"letter": "B", "text": "R$ 156.000."}, {"letter": "C", "text": "R$ 171.000."}, {"letter": "D", "text": "R$ 180.000."}], "answer": "A", "comment": "<b>Comentário:</b> DVA: receita 300.000 - insumos de terceiros (CMV 120.000 + PECLD 9.000 + impairment 15.000) = valor adicionado bruto 156.000. Menos depreciacao 20.000 = valor adicionado liquido 136.000."}, {"n": 16, "text": "Uma papelaria informou: receita R$ 250.000; CMV R$ 90.000; PECLD R$ 8.000; perda por desvalorizacao R$ 12.000; depreciacao R$ 18.000. O valor adicionado liquido produzido na DVA e:", "alts": [{"letter": "A", "text": "R$ 122.000."}, {"letter": "B", "text": "R$ 140.000."}, {"letter": "C", "text": "R$ 158.000."}, {"letter": "D", "text": "R$ 232.000."}], "answer": "A", "comment": "<b>Comentário:</b> Calculo: 250.000 - 90.000 - 8.000 - 12.000 = 140.000 de valor adicionado bruto. Subtrai depreciacao de 18.000, chegando a 122.000."}, {"n": 17, "text": "A entidade deve divulgar passivo contingente em notas, salvo quando a possibilidade de desembolso for:", "alts": [{"letter": "A", "text": "remota."}, {"letter": "B", "text": "possivel."}, {"letter": "C", "text": "provavel."}, {"letter": "D", "text": "possivel ou provavel."}], "answer": "A", "comment": "<b>Comentário:</b> Passivos contingentes possiveis sao divulgados. Quando a chance de desembolso e remota, a divulgacao e dispensada."}, {"n": 18, "text": "Uma acao judicial tem chance remota de perda, conforme avaliacao juridica. Em relacao ao passivo contingente, a entidade deve:", "alts": [{"letter": "A", "text": "nao reconhecer e, em regra, nao divulgar."}, {"letter": "B", "text": "reconhecer provisao integral."}, {"letter": "C", "text": "divulgar obrigatoriamente em nota."}, {"letter": "D", "text": "reconhecer ativo contingente."}], "answer": "A", "comment": "<b>Comentário:</b> Se a perda e remota, nao ha reconhecimento de provisao e, em regra, nao ha divulgacao de passivo contingente."}, {"n": 19, "text": "Em 01/04/2025, a Cia Azul pagou R$ 24.000 por 6 anuncios, sendo 3 veiculados em maio e 3 em junho. Pelo regime de competencia, a despesa deve ser reconhecida:", "alts": [{"letter": "A", "text": "R$ 24.000 em abril."}, {"letter": "B", "text": "R$ 12.000 em maio e R$ 12.000 em junho."}, {"letter": "C", "text": "R$ 12.000 em julho e R$ 12.000 em agosto."}, {"letter": "D", "text": "R$ 4.000 de abril a setembro."}], "answer": "B", "comment": "<b>Comentário:</b> A despesa e reconhecida quando o servico de publicidade e prestado, nao no pagamento nem quando surgirem possiveis beneficios futuros."}, {"n": 20, "text": "Uma empresa pagou R$ 30.000 por 10 insercoes publicitarias, realizadas igualmente em setembro e outubro. Pelo regime de competencia, reconhece:", "alts": [{"letter": "A", "text": "R$ 30.000 no pagamento."}, {"letter": "B", "text": "R$ 15.000 em setembro e R$ 15.000 em outubro."}, {"letter": "C", "text": "R$ 30.000 quando aumentar o faturamento."}, {"letter": "D", "text": "R$ 3.000 por mes durante dez meses."}], "answer": "B", "comment": "<b>Comentário:</b> Como as insercoes ocorreram metade em setembro e metade em outubro, a despesa acompanha a prestacao do servico."}, {"n": 21, "text": "Uma empresa comprou equipamentos por R$ 60.000. O frete rodoviario normal seria R$ 3.000, mas pagou R$ 8.000 por transporte aereo para antecipar a entrega. Instalacao: R$ 2.000. Testes: R$ 4.000. O custo do imobilizado e:", "alts": [{"letter": "A", "text": "R$ 69.000."}, {"letter": "B", "text": "R$ 74.000."}, {"letter": "C", "text": "R$ 66.000."}, {"letter": "D", "text": "R$ 60.000."}], "answer": "A", "comment": "<b>Comentário:</b> Entram no custo: preco, frete necessario normal, instalacao e testes. O excedente do frete por urgencia nao e necessario para colocar o ativo em condicao de uso. 60.000 + 3.000 + 2.000 + 4.000 = 69.000."}, {"n": 22, "text": "A Cia Norte adquiriu computadores por R$ 35.000. O frete comum custaria R$ 1.500, mas pagou R$ 4.500 por entrega expressa. Instalacao R$ 800 e testes R$ 1.200. O valor registrado no imobilizado e:", "alts": [{"letter": "A", "text": "R$ 38.500."}, {"letter": "B", "text": "R$ 41.500."}, {"letter": "C", "text": "R$ 36.500."}, {"letter": "D", "text": "R$ 35.000."}], "answer": "A", "comment": "<b>Comentário:</b> Somam-se os custos diretamente atribuiveis necessarios: 35.000 + frete normal 1.500 + instalacao 800 + testes 1.200 = 38.500. O excedente do frete expresso e despesa."}, {"n": 23, "text": "A empresa processou duas partes pedindo R$ 20.000 e R$ 30.000. Os advogados classificaram as chances de ganho como possivel e provavel, respectivamente. O ativo contingente a reconhecer e:", "alts": [{"letter": "A", "text": "zero."}, {"letter": "B", "text": "R$ 20.000."}, {"letter": "C", "text": "R$ 30.000."}, {"letter": "D", "text": "R$ 50.000."}], "answer": "A", "comment": "<b>Comentário:</b> Ativo contingente nao e reconhecido nas demonstracoes. Quando a entrada e provavel, pode haver divulgacao; reconhecimento so ocorre quando a realizacao e praticamente certa."}, {"n": 24, "text": "Uma entidade pede indenizacao de R$ 12.000 com chance remota e R$ 18.000 com chance possivel. Nas demonstracoes contabeis, o ativo contingente reconhecido sera:", "alts": [{"letter": "A", "text": "zero."}, {"letter": "B", "text": "R$ 12.000."}, {"letter": "C", "text": "R$ 18.000."}, {"letter": "D", "text": "R$ 30.000."}], "answer": "A", "comment": "<b>Comentário:</b> Ativos contingentes nao sao reconhecidos por prudencia. Chance possivel ou remota nao gera ativo nas demonstracoes."}, {"n": 25, "text": "A empresa Arcus contratou exames medicos para empregados por R$ 10.000. Os empregados reembolsam 30% e a empresa arca com o restante. O impacto na DRE e:", "alts": [{"letter": "A", "text": "-R$ 3.000."}, {"letter": "B", "text": "-R$ 7.000."}, {"letter": "C", "text": "-R$ 10.000."}, {"letter": "D", "text": "zero."}], "answer": "B", "comment": "<b>Comentário:</b> O gasto total e 10.000, mas 30% sera suportado pelos empregados. A parcela da empresa e 70%: 7.000 de despesa."}, {"n": 26, "text": "A Cia Vida pagou R$ 8.000 por atendimento medico aos funcionarios. Do total, 25% sera descontado dos empregados. O impacto no resultado da empresa e:", "alts": [{"letter": "A", "text": "-R$ 2.000."}, {"letter": "B", "text": "-R$ 6.000."}, {"letter": "C", "text": "-R$ 8.000."}, {"letter": "D", "text": "-R$ 10.000."}], "answer": "B", "comment": "<b>Comentário:</b> A empresa reconhece apenas a parcela que efetivamente suporta: 75% de 8.000 = 6.000."}, {"n": 27, "text": "Um restaurante comprou forno por R$ 50.000 e obteve desconto de 10% por pagamento imediato. A saida de caixa foi R$ 45.000. A contrapartida correta e:", "alts": [{"letter": "A", "text": "Ativo imobilizado de R$ 45.000."}, {"letter": "B", "text": "Ativo imobilizado de R$ 50.000 e receita financeira de R$ 5.000."}, {"letter": "C", "text": "Ativo imobilizado de R$ 50.000 e outras receitas de R$ 5.000."}, {"letter": "D", "text": "Ativo imobilizado de R$ 50.000 e retificadora de R$ 5.000."}], "answer": "A", "comment": "<b>Comentário:</b> Desconto obtido na aquisicao reduz o custo de compra. O imobilizado entra pelo valor efetivamente pago/valor de aquisicao liquido: 45.000."}, {"n": 28, "text": "Um hotel adquiriu equipamento por R$ 80.000, com abatimento comercial de 5% por pagamento via Pix. O caixa diminuiu R$ 76.000. O lancamento reconhece:", "alts": [{"letter": "A", "text": "ativo imobilizado de R$ 76.000."}, {"letter": "B", "text": "ativo imobilizado de R$ 80.000 e receita de R$ 4.000."}, {"letter": "C", "text": "despesa de R$ 4.000."}, {"letter": "D", "text": "ativo imobilizado de R$ 80.000 e passivo de R$ 4.000."}], "answer": "A", "comment": "<b>Comentário:</b> O abatimento reduz diretamente o custo do ativo. Nao se reconhece receita financeira por desconto comercial na compra."}, {"n": 29, "text": "Uma empresa possui: caixa R$ 80.000; estoques R$ 170.000; emprestimos CP R$ 120.000; financiamento LP R$ 300.000; imobilizado R$ 520.000; intangivel R$ 180.000; capital social R$ 350.000. O ativo nao circulante e:", "alts": [{"letter": "A", "text": "R$ 700.000."}, {"letter": "B", "text": "R$ 250.000."}, {"letter": "C", "text": "R$ 520.000."}, {"letter": "D", "text": "R$ 1.050.000."}], "answer": "A", "comment": "<b>Comentário:</b> Ativo nao circulante inclui imobilizado e intangivel: 520.000 + 180.000 = 700.000. Caixa e estoques sao circulantes."}, {"n": 30, "text": "Em 31/12/X1, a entidade tinha caixa R$ 60.000, estoques R$ 90.000, contas a receber R$ 40.000, imobilizado R$ 310.000 e intangivel R$ 140.000. O ativo nao circulante soma:", "alts": [{"letter": "A", "text": "R$ 450.000."}, {"letter": "B", "text": "R$ 190.000."}, {"letter": "C", "text": "R$ 310.000."}, {"letter": "D", "text": "R$ 640.000."}], "answer": "A", "comment": "<b>Comentário:</b> O ativo nao circulante considerado e formado por imobilizado e intangivel: 310.000 + 140.000 = 450.000."}, {"n": 31, "text": "Materiais foram comprados em marco, pagos em junho e utilizados na prestacao de servicos em abril. Pelo regime de competencia, a despesa deve ser reconhecida em:", "alts": [{"letter": "A", "text": "marco."}, {"letter": "B", "text": "abril."}, {"letter": "C", "text": "junho."}, {"letter": "D", "text": "dezembro."}], "answer": "B", "comment": "<b>Comentário:</b> A despesa e reconhecida quando os materiais sao consumidos/utilizados para gerar receita, ou seja, em abril."}, {"n": 32, "text": "A empresa comprou insumos em janeiro, pagou em fevereiro e consumiu os insumos na prestacao de servicos em maio. A despesa deve ser reconhecida em:", "alts": [{"letter": "A", "text": "janeiro."}, {"letter": "B", "text": "fevereiro."}, {"letter": "C", "text": "maio."}, {"letter": "D", "text": "quando houver pagamento ao fornecedor."}], "answer": "C", "comment": "<b>Comentário:</b> Pela competencia, o reconhecimento da despesa ocorre no periodo do consumo dos insumos, nao na compra nem no pagamento."}, {"n": 33, "text": "Relacione: 1. Emprestimos a pagar em 18 meses. 2. Clientes a receber em 4 meses. 3. Fornecedores a pagar em 2 meses. 4. Veiculos para uso por 5 anos. Na ordem Ativo Circulante, Ativo Nao Circulante, Passivo Circulante, Passivo Nao Circulante:", "alts": [{"letter": "A", "text": "2 - 4 - 3 - 1."}, {"letter": "B", "text": "4 - 2 - 1 - 3."}, {"letter": "C", "text": "3 - 1 - 2 - 4."}, {"letter": "D", "text": "1 - 3 - 4 - 2."}], "answer": "A", "comment": "<b>Comentário:</b> Recebiveis em 4 meses sao AC; veiculos de uso sao ANC; fornecedores em 2 meses sao PC; emprestimos em 18 meses sao PNC."}, {"n": 34, "text": "Associe: 1. Duplicatas a receber em 8 meses. 2. Maquinas para uso por 7 anos. 3. Salarios a pagar no mes seguinte. 4. Financiamento a pagar em 36 meses. Na ordem AC, ANC, PC e PNC:", "alts": [{"letter": "A", "text": "1 - 2 - 3 - 4."}, {"letter": "B", "text": "2 - 1 - 4 - 3."}, {"letter": "C", "text": "3 - 4 - 1 - 2."}, {"letter": "D", "text": "4 - 3 - 2 - 1."}], "answer": "A", "comment": "<b>Comentário:</b> Direitos realizaveis em ate 12 meses sao AC; maquinas de uso sao ANC; obrigacoes de curto prazo sao PC; financiamento de longo prazo e PNC."}, {"n": 35, "text": "Assinale a alternativa que apresenta apenas componentes do Patrimonio Liquido:", "alts": [{"letter": "A", "text": "Capital Social - Reservas de Lucros - Acoes em Tesouraria."}, {"letter": "B", "text": "Capital Social - Fornecedores - Reservas de Capital."}, {"letter": "C", "text": "Debentures - Ajustes de Avaliacao Patrimonial - Capital Social."}, {"letter": "D", "text": "Investimentos - Capital Social - Reservas de Lucros."}], "answer": "A", "comment": "<b>Comentário:</b> Capital social, reservas de lucros e acoes em tesouraria integram o PL. Fornecedores e debentures sao passivos; investimentos sao ativos."}, {"n": 36, "text": "Conforme a Lei das S.A., compoem o Patrimonio Liquido:", "alts": [{"letter": "A", "text": "Reservas de Capital - Ajustes de Avaliacao Patrimonial - Prejuizos Acumulados."}, {"letter": "B", "text": "Caixa - Reservas de Lucros - Capital Social."}, {"letter": "C", "text": "Dividendos a Pagar - Capital Social - Acoes em Tesouraria."}, {"letter": "D", "text": "Emprestimos - Reservas de Capital - Ajustes de Avaliacao Patrimonial."}], "answer": "A", "comment": "<b>Comentário:</b> Reservas de capital, ajustes de avaliacao patrimonial e prejuizos acumulados sao contas do PL. Caixa e ativo; dividendos a pagar e emprestimos sao passivos."}, {"n": 37, "text": "A investidora possui: Omega controlada 80%, PL R$ 900.000; Gama controlada 75%, PL R$ 600.000; Beta coligada 30%, PL R$ 500.000; Delta sem influencia 10%, PL R$ 400.000. A participacao de nao controladores no consolidado e:", "alts": [{"letter": "A", "text": "R$ 330.000."}, {"letter": "B", "text": "R$ 480.000."}, {"letter": "C", "text": "R$ 150.000."}, {"letter": "D", "text": "R$ 1.100.000."}], "answer": "A", "comment": "<b>Comentário:</b> Nao controladores existem apenas nas controladas consolidadas. Omega: 20% x 900.000 = 180.000. Gama: 25% x 600.000 = 150.000. Total = 330.000."}, {"n": 38, "text": "A Cia Mae controla Alfa com 85% de participacao e PL de R$ 1.200.000, e Beta com 60% e PL de R$ 800.000. Tambem possui coligada Gama 25%, PL R$ 700.000. A participacao de nao controladores e:", "alts": [{"letter": "A", "text": "R$ 500.000."}, {"letter": "B", "text": "R$ 675.000."}, {"letter": "C", "text": "R$ 320.000."}, {"letter": "D", "text": "R$ 180.000."}], "answer": "A", "comment": "<b>Comentário:</b> Calcula-se apenas sobre controladas: Alfa 15% x 1.200.000 = 180.000; Beta 40% x 800.000 = 320.000; total = 500.000. Coligada nao entra como nao controladores no consolidado."}, {"n": 39, "text": "Uma empresa adquiriu maquina com: preco R$ 400.000; imposto nao recuperavel R$ 40.000; preparacao do local R$ 70.000; materiais consumidos em testes R$ 30.000; honorarios dos tecnicos dos testes R$ 20.000; valor residual R$ 80.000. O custo inicial do imobilizado e:", "alts": [{"letter": "A", "text": "R$ 400.000."}, {"letter": "B", "text": "R$ 440.000."}, {"letter": "C", "text": "R$ 510.000."}, {"letter": "D", "text": "R$ 560.000."}], "answer": "D", "comment": "<b>Comentário:</b> Custo inicial inclui preco, tributos nao recuperaveis e custos diretamente atribuiveis para colocar o ativo em condicao de uso: 400.000 + 40.000 + 70.000 + 30.000 + 20.000 = 560.000. Valor residual nao reduz o custo inicial; afeta depreciacao."}, {"n": 40, "text": "A Cia Industria instalou equipamento com: preco R$ 300.000; imposto de importacao nao recuperavel R$ 30.000; frete e seguro R$ 25.000; instalacao R$ 15.000; testes R$ 10.000; vida util 8 anos; residual R$ 50.000. O custo de registro inicial e:", "alts": [{"letter": "A", "text": "R$ 330.000."}, {"letter": "B", "text": "R$ 355.000."}, {"letter": "C", "text": "R$ 380.000."}, {"letter": "D", "text": "R$ 430.000."}], "answer": "C", "comment": "<b>Comentário:</b> Somam-se todos os custos necessarios para colocar o ativo em funcionamento: 300.000 + 30.000 + 25.000 + 15.000 + 10.000 = 380.000. Vida util e residual sao usados na depreciacao."}, {"n": 41, "text": "Uma maquina foi adquirida em 01/01/2021 por R$ 300.000, vida util inicial de 10 anos e sem residual, depreciacao linear. Em 31/12/2025, a vida util total foi reestimada para 12 anos e o residual passou a R$ 60.000. A depreciacao anual a partir de 2026 e:", "alts": [{"letter": "A", "text": "R$ 15.000."}, {"letter": "B", "text": "R$ 12.857."}, {"letter": "C", "text": "R$ 30.000."}, {"letter": "D", "text": "R$ 60.000."}], "answer": "B", "comment": "<b>Comentário:</b> Depreciacao acumulada em 5 anos: 300.000/10 x 5 = 150.000. Valor contabil em 31/12/2025 = 150.000. Vida remanescente: 12 - 5 = 7 anos. Base depreciavel nova: 150.000 - 60.000 = 90.000. Depreciacao anual = 90.000/7 = 12.857,14."}, {"n": 42, "text": "Um equipamento foi comprado em 01/01/2020 por R$ 500.000, vida util inicial de 10 anos, sem residual, metodo linear. Em 31/12/2024, a vida util total foi reestimada para 8 anos e o valor residual para R$ 80.000. A depreciacao anual futura sera:", "alts": [{"letter": "A", "text": "R$ 56.667."}, {"letter": "B", "text": "R$ 50.000."}, {"letter": "C", "text": "R$ 90.000."}, {"letter": "D", "text": "R$ 80.000."}], "answer": "A", "comment": "<b>Comentário:</b> Ate 31/12/2024 passaram 5 anos: depreciacao acumulada = 500.000/10 x 5 = 250.000. Valor contabil = 250.000. Vida remanescente = 8 - 5 = 3 anos. Nova base = 250.000 - 80.000 = 170.000. Depreciacao anual = 170.000/3 = 56.666,67."}, {"n": 43, "text": "Segundo a Estrutura Conceitual, quais são as características qualitativas fundamentais da informação contábil-financeira útil?", "alts": [{"letter": "A", "text": "relevância e representação fidedigna."}, {"letter": "B", "text": "comparabilidade e tempestividade."}, {"letter": "C", "text": "prudência e conservadorismo."}, {"letter": "D", "text": "verificabilidade e compreensibilidade."}], "answer": "A", "comment": "<b>Comentário:</b> As características fundamentais são relevância e representação fidedigna. As demais são características de melhoria ou termos que não substituem as fundamentais."}, {"n": 44, "text": "A representação fidedigna, conforme a Estrutura Conceitual, não significa exatidão absoluta em todos os aspectos. Ela exige que a informação seja:", "alts": [{"letter": "A", "text": "completa, neutra e livre de erro."}, {"letter": "B", "text": "material, comparável e tempestiva."}, {"letter": "C", "text": "prudente, conservadora e verificável."}, {"letter": "D", "text": "uniforme, simples e sintética."}], "answer": "A", "comment": "<b>Comentário:</b> A representação fidedigna exige completude, neutralidade e ausência de erro. Livre de erro não é sinônimo de perfeição absoluta, mas de ausência de erros relevantes no processo."}, {"n": 45, "text": "A informação é considerada material quando sua omissão, distorção ou obscuridade pode influenciar decisões tomadas pelos usuários principais. Esse conceito se relaciona diretamente com:", "alts": [{"letter": "A", "text": "relevância."}, {"letter": "B", "text": "comparabilidade."}, {"letter": "C", "text": "verificabilidade."}, {"letter": "D", "text": "tempestividade."}], "answer": "A", "comment": "<b>Comentário:</b> Materialidade é aspecto específico da relevância. Uma informação material é capaz de influenciar decisões dos usuários."}, {"n": 46, "text": "O pressuposto da continuidade indica que a entidade:", "alts": [{"letter": "A", "text": "continuará em operação no futuro previsível, salvo evidência de liquidação ou encerramento."}, {"letter": "B", "text": "deve reconhecer receitas apenas quando receber caixa."}, {"letter": "C", "text": "deve compensar ativos e passivos sempre que possível."}, {"letter": "D", "text": "deve apresentar apenas informações sem estimativas."}], "answer": "A", "comment": "<b>Comentário:</b> A continuidade presume a manutenção das operações no futuro previsível. Não se confunde com regime de caixa, compensação ou ausência de estimativas."}, {"n": 47, "text": "Na NBC TG 26, a compensação entre ativos e passivos ou receitas e despesas:", "alts": [{"letter": "A", "text": "não deve ser feita, exceto quando exigida ou permitida por norma."}, {"letter": "B", "text": "é obrigatória sempre que reduzir o tamanho das demonstrações."}, {"letter": "C", "text": "é livre, desde que facilite a leitura."}, {"letter": "D", "text": "é vedada apenas para entidades de capital aberto."}], "answer": "A", "comment": "<b>Comentário:</b> A regra geral é não compensar. A compensação só ocorre quando uma norma permitir ou exigir."}, {"n": 48, "text": "Uma empresa comercial apresentou na DVA: receita de contratos com clientes de R$ 180.000,00; CMV de R$ 70.000,00; perdas estimadas com créditos de liquidação duvidosa de R$ 5.000,00; perdas por desvalorização de ativos de R$ 8.000,00; depreciação de R$ 12.000,00, O valor adicionado líquido produzido é:", "alts": [{"letter": "A", "text": "R$ 85.000,00,"}, {"letter": "B", "text": "R$ 97.000,00,"}, {"letter": "C", "text": "R$ 110.000,00,"}, {"letter": "D", "text": "R$ 168.000,00,"}], "answer": "A", "comment": "<b>Comentário:</b> Cálculo da DVA: receita menos insumos/retencões (70.000,00 + 5.000,00 + 8.000,00) = R$ 97.000,00, Depois subtrai a depreciação de R$ 12.000,00. chegando a R$ 85.000,00,"}, {"n": 49, "text": "Uma empresa comercial apresentou na DVA: receita de contratos com clientes de R$ 420.000,00; CMV de R$ 160.000,00; perdas estimadas com créditos de liquidação duvidosa de R$ 14.000,00; perdas por desvalorização de ativos de R$ 26.000,00; depreciação de R$ 30.000,00, O valor adicionado líquido produzido é:", "alts": [{"letter": "A", "text": "R$ 190.000,00,"}, {"letter": "B", "text": "R$ 220.000,00,"}, {"letter": "C", "text": "R$ 260.000,00,"}, {"letter": "D", "text": "R$ 390.000,00,"}], "answer": "A", "comment": "<b>Comentário:</b> Cálculo da DVA: receita menos insumos/retencões ndo há obrigação presente, saída provável e estimativa confiável, deve-se reconhecer provisão."}, {"n": 87, "text": "Uma entidade possui processo com perda possível. Segundo a NBC TG 25, o tratamento adequado é:", "alts": [{"letter": "A", "text": "não reconhecer provisão e divulgar passivo contingente."}, {"letter": "B", "text": "reconhecer provisão obrigatoriamente."}, {"letter": "C", "text": "reconhecer ativo contingente."}, {"letter": "D", "text": "reconhecer reserva no patrimônio líquido."}], "answer": "A", "comment": "<b>Comentário:</b> Perda possível não gera provisão, mas exige divulgação como passivo contingente, salvo se remota."}, {"n": 88, "text": "Uma entidade possui chance remota de perda em processo judicial. Nesse caso:", "alts": [{"letter": "A", "text": "não reconhece provisão e, em regra, não divulga passivo contingente."}, {"letter": "B", "text": "reconhece provisão integral."}, {"letter": "C", "text": "reconhece provisão parcial."}, {"letter": "D", "text": "divulga obrigatoriamente em notas explicativas."}], "answer": "A", "comment": "<b>Comentário:</b> Quando a chance de saída de recursos é remota, não há provisão e a divulgação é dispensada em regra."}, {"n": 89, "text": "Um ganho judicial foi avaliado como provável pelos advogados. O ativo contingente deve ser:", "alts": [{"letter": "A", "text": "não reconhecido, podendo ser divulgado se provável."}, {"letter": "B", "text": "reconhecido integralmente."}, {"letter": "C", "text": "reconhecido parcialmente."}, {"letter": "D", "text": "deduzido do passivo contingente."}], "answer": "A", "comment": "<b>Comentário:</b> Ativo contingente não é reconhecido antes da realização praticamente certa. Se provável, pode haver divulgação."}, {"n": 90, "text": "O ativo contingente somente deve ser reconhecido quando:", "alts": [{"letter": "A", "text": "a realização do ganho for praticamente certa."}, {"letter": "B", "text": "a chance for possível."}, {"letter": "C", "text": "a chance for remota."}, {"letter": " a aplicável."}, {"letter": "B", "text": "todo pagamento deve ser despesa imediata."}, {"letter": "C", "text": "todo recebimento deve ser receita imediata."}, {"letter": "D", "text": "estimativas contábeis são proibidas."}], "answer": "A", "comment": "<b>Comentário:</b> A contabilidade societária utiliza competência, essência econômica e critérios de reconhecimento/mensuração previstos nas normas. Pagamento e recebimento não definem, sozinhos, receita ou despesa."}];
const WHATSAPP='5561985323574';
let idx=Number(localStorage.getItem('pm_l3_idx')||0);
let mode='question';
let answers=JSON.parse(localStorage.getItem('pm_l3_answers')||'{}');
let name=localStorage.getItem('pm_l3_name')||'';
let start=Number(localStorage.getItem('pm_l3_start')||0);
function pad(n){return String(n).padStart(2,'0')}
function elapsed(){let s=Math.floor((Date.now()-start)/1000);return `${pad(Math.floor(s/3600))}:${pad(Math.floor(s%3600/60))}:${pad(s%60)}`}
setInterval(()=>{if(start) document.getElementById('timer').textContent=elapsed()},1000);
document.addEventListener('DOMContentLoaded',()=>{const inp=document.getElementById('studentName'); if(inp){inp.addEventListener('keydown',e=>{if(e.key==='Enter') unlock();});}});
function save(){localStorage.setItem('pm_l3_idx',idx);localStorage.setItem('pm_l3_answers',JSON.stringify(answers));}
function unlock(){
  const n=document.getElementById('studentName').value.trim(); if(!n){alert('Digite o nome do aluno.');return;}
  name=n; localStorage.setItem('pm_l3_name',name); if(!start){start=Date.now();localStorage.setItem('pm_l3_start',start)}
  const msg=encodeURIComponent(`Professor Moreira, sou ${name} e estou iniciando o Quiz Lista 3.`);
  try{ window.open(`https://wa.me/${WHATSAPP}?text=${msg}`,'_blank'); }catch(e){}
  mode='question';
  render();
}
function render(){
  if(name){document.getElementById('lock').classList.add('hidden');document.getElementById('bottomNav').classList.remove('hidden');document.getElementById('gridCard').classList.remove('hidden')}
  document.getElementById('bar').style.width=((idx+1)/QUESTIONS.length*100)+'%';
  document.getElementById('metaQ').textContent=`Questão ${idx+1}/${QUESTIONS.length}`;
  if(mode==='final') return renderFinal();
  if(mode==='answer') return renderAnswer();
  renderQuestion(); renderGrid();
}
function renderQuestion(){
  document.getElementById('quiz').classList.remove('hidden'); document.getElementById('answer').classList.add('hidden'); document.getElementById('final').classList.add('hidden');
  document.getElementById('mainBtn').textContent='Comentários'; document.getElementById('mainBtn').onclick=showAnswer;
  const q=QUESTIONS[idx]; const sel=answers[q.n]||'';
  document.getElementById('questionCard').innerHTML=`<span class="qnum">Questão ${String(q.n).padStart(3,'0')}</span><div class="statement">${q.text}</div>`+
    q.alts.map(a=>`<button class="alt ${sel===a.letter?'selected':''}" onclick="selectAlt('${a.letter}')"><span class="letter">${a.letter}</span><span>${a.text}</span></button>`).join('')+`<div class="wacom-space"></div><div class="wacom-note">Área livre da tela para anotações com caneta Wacom.</div>`;
}
function selectAlt(l){answers[QUESTIONS[idx].n]=l;save();renderQuestion();renderGrid();}
function renderAnswer(){
  document.getElementById('quiz').classList.add('hidden'); document.getElementById('answer').classList.remove('hidden'); document.getElementById('final').classList.add('hidden');
  document.getElementById('mainBtn').textContent= idx===QUESTIONS.length-1 ? 'Finalizar' : 'Próxima questão'; document.getElementById('mainBtn').onclick=next;
  renderGrid();
  const q=QUESTIONS[idx]; const sel=answers[q.n]||'Não marcada';
  document.getElementById('answerCard').innerHTML=`<span class="qnum">Comentário da Questão ${String(q.n).padStart(3,'0')}</span>
  <div class="answerBox">Sua resposta: <b>${sel}</b><br>Gabarito: <span class="gabarito">${q.answer}</span></div>
  <div class="statement">${q.text}</div>`+
  q.alts.map(a=>`<div class="alt ${a.letter===q.answer?'correct':(sel===a.letter?'wrong':'')}"><span class="letter">${a.letter}</span><span>${a.text}</span></div>`).join('')+
  `<div class="comment">${q.comment}</div><div class="wacom-space"></div><div class="wacom-note">Área livre da tela para anotações com caneta Wacom.</div>`;
}
function renderGrid(){
  document.getElementById('grid').innerHTML=QUESTIONS.map((q,i)=>`<button class="dot ${answers[q.n]?'answered':''} ${i===idx?'current':''}" onclick="idx=${i};mode='question';save();render()">${q.n}</button>`).join('');
}
function showAnswer(){mode='answer'; render();}
function next(){ if(idx<QUESTIONS.length-1){idx++; mode='question'; save(); render();} else {mode='final'; render();} }
function prev(){ if(mode==='answer'){mode='question'; render(); return;} if(idx>0){idx--; mode='question'; save(); render();} }
function renderFinal(){
 document.getElementById('quiz').classList.add('hidden'); document.getElementById('answer').classList.add('hidden'); document.getElementById('final').classList.remove('hidden'); document.getElementById('bottomNav').classList.add('hidden'); document.getElementById('gridCard').classList.add('hidden');
 let correct=0, lines=[]; QUESTIONS.forEach(q=>{let a=answers[q.n]||'-'; if(a===q.answer) correct++; lines.push(`${q.n}-${a} (Gabarito: ${q.answer})`);});
 const perc=(correct/QUESTIONS.length*100).toFixed(2).replace('.',',');
 const texto=`Aluno: ${name}
Quiz: Lista 3 - 105 questões
Tempo: ${elapsed()}
Respondidas: ${Object.keys(answers).length}/${QUESTIONS.length}
Acertos: ${correct}
Erros: ${QUESTIONS.length-correct}
Percentual: ${perc}%

Gabarito do aluno:
${lines.join('\n')}`;
 document.getElementById('final').innerHTML=`<h2>Simulado concluído</h2><p><b>Aluno:</b> ${name}</p><p><b>Tempo:</b> ${elapsed()}</p><p><b>Respondidas:</b> ${Object.keys(answers).length}/${QUESTIONS.length}</p><textarea readonly>${texto}</textarea><br><br><button class="ok" style="width:100%" onclick="sendResult()">Enviar gabarito ao Professor</button><br><br><button class="secondary" style="width:100%" onclick="restart()">Recomeçar</button>`;
}
function sendResult(){
 let correct=0, lines=[]; QUESTIONS.forEach(q=>{let a=answers[q.n]||'-'; if(a===q.answer) correct++; lines.push(`${q.n}-${a} (Gabarito: ${q.answer})`);});
 const perc=(correct/QUESTIONS.length*100).toFixed(2).replace('.',',');
 const texto=`Aluno: ${name}
Quiz: Lista 3 - 105 questões
Tempo: ${elapsed()}
Respondidas: ${Object.keys(answers).length}/${QUESTIONS.length}
Acertos: ${correct}
Erros: ${QUESTIONS.length-correct}
Percentual: ${perc}%

Gabarito do aluno:
${lines.join('\n')}`;
 window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(texto)}`,'_blank');
}
function restart(){ if(confirm('Deseja apagar as respostas e recomeçar?')){localStorage.removeItem('pm_l3_idx');localStorage.removeItem('pm_l3_answers');localStorage.removeItem('pm_l3_start');idx=0;answers={};start=Date.now();localStorage.setItem('pm_l3_start',start);mode='question';document.getElementById('bottomNav').classList.remove('hidden');render();} }
if(name){start=start||Date.now();localStorage.setItem('pm_l3_start',start);render();} else {document.getElementById('bottomNav').classList.add('hidden');document.getElementById('gridCard').classList.add('hidden');}
</script>
